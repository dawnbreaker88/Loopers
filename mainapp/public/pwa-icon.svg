<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#40A2E3" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Background Container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer Glow Circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="12" />
  
  <!-- Stylized Loopers 'L' & Delivery Loop -->
  <g filter="url(#shadow)">
    <!-- Main Loop Path -->
    <path d="M160 140 C160 140 160 340 160 340 C160 365 180 384 205 384 L350 384 C375 384 390 360 375 340 C350 310 280 230 250 190 C235 170 210 160 185 170 L160 180" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="44" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    <!-- Dynamic Accent Dot -->
    <circle cx="372" cy="180" r="28" fill="#ffffff" />
  </g>
</svg>
